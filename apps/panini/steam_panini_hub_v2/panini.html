<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carnet STEAM</title>
  <!-- Import Cinzel Decorative font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="panini.css" />
  <script src="shared.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header class="top-bar">
    <div class="left-controls">
      <label>Nom de l'agent
        <input id="nameInput" type="text" />
      </label>
      <label>Code mission
        <input id="codeInput" type="text" maxlength="3" />
      </label>
      <button id="unlockBtn">Débloquer</button>
    </div>
    <div class="right-controls">
      <button id="exportPdfBtn">Exporter PDF</button>
      <button id="hubBtn">Retour au Hub</button>
    </div>
  </header>
  <main class="sheet-container">
    <div class="panini-wrapper">
      <div id="paniniSheet" class="panini-sheet">
        <div id="agentName" class="agent-name"></div>
        <!-- Decorative gear icons and logo -->
        <img src="assets/gear.png" alt="gear" class="decor gear-left" />
        <img src="assets/gear.png" alt="gear" class="decor gear-right" />
        <img src="assets/steam-logo.png" alt="steam logo" class="decor logo" />
      </div>
      <div id="inventory" class="inventory"></div>
    </div>
  </main>
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span id="modalClose" class="close">&times;</span>
      <h2 id="modalTitle"></h2>
      <img id="modalImage" alt="Mission image" />
      <p id="modalDescription"></p>
      <p id="modalSecret"></p>
    </div>
  </div>
  <!-- Inline fallback for missions.json when served from file://. When you update missions, regenerate this content or remove it in production. -->
  <script id="missions-data" type="application/json">
  [
    {"id":"ATT","name":"Att.E9BjTxkDNPxwC6nuocVHaQhaKXIIwSpXNdxE2zyQcf0","description":"","secret":"","image":"missions/images/att.e9BjTxkDNPxwC6nuocVHaQhaKXIIwSpXNdxE2zyQcf0.jpg","back":1},
    {"id":"ORI","name":"Orient Express 1536X1536","description":"","secret":"","image":"missions/images/orient-express-1536x1536.jpg","back":1},
    {"id":"LPT","name":"Lpt1Yxp6K3Y0Cwtknkpd","description":"","secret":"","image":"missions/images/lpt1yxp6k3y0cwtknkpd.jpg","back":1}
  ]
  </script>
  <script src="panini.js"></script>
</body>
</html>
