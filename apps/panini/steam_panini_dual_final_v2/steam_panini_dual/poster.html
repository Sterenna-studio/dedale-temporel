<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poster STEAM</title>
  <!-- Cinzel Decorative for the player name -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="poster.css">
  <!-- PDF export libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="controls">
    <label>Nom de l'agent&nbsp;:
      <input type="text" id="player-name" value="Agent">
    </label>
    <label>Code mission&nbsp;:
      <input type="text" id="unlock-code" maxlength="3">
      <button id="unlock-button">Débloquer</button>
    </label>
    <button id="export-pdf">Exporter en PDF</button>
  </div>
  <div class="sheet-container">
    <!-- Poster sheet with background and grid overlay -->
    <div id="sheet" class="poster-sheet">
      <div id="player-name-display" class="player-name">Agent</div>
      <div id="grid" class="grid"></div>
    </div>
    <!-- Inventory below the poster -->
    <div id="inventory" class="inventory">
      <h2>Inventaire</h2>
      <div id="inventory-items" class="inventory-items"></div>
    </div>
  </div>
  <!-- Modal for mission details -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="modal-close" class="modal-close">×</button>
      <h2 id="modal-title"></h2>
      <div class="modal-image-wrapper">
        <img id="modal-image" alt="Mission image">
      </div>
      <p id="modal-description"></p>
      <p id="modal-secret"></p>
    </div>
  </div>
