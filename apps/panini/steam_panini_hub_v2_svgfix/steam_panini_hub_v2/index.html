<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub Panini STEAM</title>
  <!-- Import Cinzel Decorative font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
      background: #f5f0e6;
      color: #333;
    }
    h1 {
      margin: 0 0 1rem 0;
      text-align: center;
      font-family: "Cinzel", sans-serif;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .controls label {
      display: flex;
      flex-direction: column;
      font-size: 0.9rem;
    }
    input[type="text"] {
      padding: 0.4rem 0.6rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      min-width: 12rem;
    }
    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #0075a2;
      color: white;
    }
    button:hover {
      background: #005b80;
    }
    .summary {
      max-width: 600px;
      margin: 0 auto;
    }
    .summary h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }
    ul.inventory {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    ul.inventory li {
      font-size: 0.9rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
    }
  </style>
  <!-- Load shared helpers -->
  <script src="shared.js"></script>
</head>
<body>
  <h1>Carnet de l'Agent STEAM</h1>
  <div class="controls">
    <label>
      Nom de l'agent
      <input id="nameInput" type="text" placeholder="Agent" />
    </label>
    <label>
      Code mission (3 lettres)
      <input id="codeInput" type="text" maxlength="3" />
    </label>
    <button id="unlockBtn">Débloquer</button>
    <button id="posterBtn">Ouvrir Affiche</button>
    <button id="paniniBtn">Ouvrir Carnet</button>
  </div>
  <div class="summary">
    <h2>Missions débloquées</h2>
    <ul id="unlockedList" class="inventory"></ul>
  </div>

  <!-- Inline fallback missions.json if fetch fails. When you update missions, regenerate this content. -->
  <script id="missions-data" type="application/json">
  [
    {"id":"ATT","name":"Att.E9BjTxkDNPxwC6nuocVHaQhaKXIIwSpXNdxE2zyQcf0","description":"","secret":"","image":"missions/images/att.e9BjTxkDNPxwC6nuocVHaQhaKXIIwSpXNdxE2zyQcf0.jpg","back":1},
    {"id":"ORI","name":"Orient Express 1536X1536","description":"","secret":"","image":"missions/images/orient-express-1536x1536.jpg","back":1},
    {"id":"LPT","name":"Lpt1Yxp6K3Y0Cwtknkpd","description":"","secret":"","image":"missions/images/lpt1yxp6k3y0cwtknkpd.jpg","back":1}
  ]
  </script>
  <script>
    (async function() {
      const missions = await loadMissions();
      let state = loadState();
      // Populate name
      const nameInput = document.getElementById('nameInput');
      nameInput.value = state.name || '';
      nameInput.addEventListener('input', () => {
        state.name = nameInput.value.trim();
        saveState(state);
      });
      // Unlock button
      const codeInput = document.getElementById('codeInput');
      document.getElementById('unlockBtn').addEventListener('click', () => {
        const code = codeInput.value.trim().toUpperCase();
        if (!code) return;
        const mission = unlockMission(code, missions, state);
        if (mission) {
          alert('Mission ' + mission.name + ' débloquée !');
          renderUnlocked();
        } else {
          alert('Aucune mission trouvée pour ce code.');
        }
        codeInput.value = '';
      });
      // Navigation buttons
      document.getElementById('posterBtn').addEventListener('click', () => {
        window.location.href = assetUrl('poster.html');
      });
      document.getElementById('paniniBtn').addEventListener('click', () => {
        window.location.href = assetUrl('panini.html');
      });
      // Render unlocked list
      function renderUnlocked() {
        state = loadState();
        const ul = document.getElementById('unlockedList');
        ul.innerHTML = '';
        state.unlocked.forEach(code => {
          const li = document.createElement('li');
          const mission = missions.find(m => m.id.toUpperCase() === code);
          li.textContent = mission ? mission.name : code;
          ul.appendChild(li);
        });
      }
      renderUnlocked();
    })();
  </script>
</body>
</html>
