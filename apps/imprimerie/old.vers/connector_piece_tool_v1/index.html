<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Outil de création — Jonctions (Puzzle)</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <h1>Outil de création — SVG de jonctions</h1>
  <p>Choisis un modèle (C1..C8), une orientation et un type (mâle/femelle). Tu peux copier le <em>path</em> ou télécharger un SVG.</p>
</header>

<main>
  <section class="card">
    <div class="row">
      <div>
        <label>Modèle</label>
        <select id="selType"></select>
      </div>
      <div>
        <label>Genre</label>
        <select id="selSex">
          <option value="male">Mâle (bossage)</option>
          <option value="female">Femelle (encoche)</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Orientation</label>
        <select id="selOri">
          <option value="down">Bas</option>
          <option value="up">Haut</option>
          <option value="right">Droite</option>
          <option value="left">Gauche</option>
        </select>
      </div>
      <div>
        <label>Largeur (px)</label>
        <input id="inpW" type="number" min="40" max="800" value="220"/>
      </div>
    </div>

    <div class="row">
      <div>
        <label>Hauteur (px)</label>
        <input id="inpH" type="number" min="20" max="400" value="120"/>
      </div>
      <div>
        <label>Épaisseur trait</label>
        <input id="inpStroke" type="number" min="0.5" max="10" step="0.5" value="2"/>
      </div>
    </div>

    <div class="btns">
      <button id="btnCopyPath" class="secondary">Copier le path</button>
      <button id="btnCopySvg" class="secondary">Copier le SVG</button>
      <button id="btnDownload">Télécharger SVG</button>
    </div>

    <p class="small" style="margin-top:10px">
      Les fichiers prêts à l’emploi sont aussi dans <code>svgs/</code> (mâle-bas et femelle-haut).
    </p>
  </section>

  <section class="card previewWrap">
    <div class="preview" id="preview"></div>
    <div>
      <div class="small" style="margin-bottom:8px">SVG généré :</div>
      <div class="codebox" id="out"></div>
    </div>

    <div>
      <div class="small">Bibliothèque rapide</div>
      <div class="gridSvgs" id="grid"></div>
    </div>
  </section>
</main>

<script type="module" src="tool.js"></script>
</body>
</html>
