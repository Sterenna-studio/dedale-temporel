<svg width="800" height="400" viewBox="0 0 800 400"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- STYLE GLOBAL -->
    <style>
      .pipe {
        fill: #b66a33;
        stroke: #7a4523;
        stroke-width: 3;
      }
      .pipe-border {
        fill: none;
        stroke: #4a2b16;
        stroke-width: 2;
      }
      .valve-wheel {
        fill: #f5e4c8;
        stroke: #7a4523;
        stroke-width: 3;
      }
      .valve-inner {
        fill: #b66a33;
      }
      .label {
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        fill: #2b1a0e;
        font-weight: bold;
      }
      .frost {
        fill: #e7f7ff;
        stroke: #a8c4d5;
        stroke-width: 2;
      }
      .node-cap {
        fill: #f5e4c8;
        stroke: #7a4523;
        stroke-width: 3;
      }
    </style>

    <!-- ❶ Segment droit horizontal -->
    <g id="pipe-straight-h">
      <rect x="0" y="0" width="120" height="18" rx="8" ry="8" class="pipe"/>
      <rect x="0" y="0" width="120" height="18" rx="8" ry="8" class="pipe-border"/>
    </g>

    <!-- ❷ Segment droit vertical -->
    <g id="pipe-straight-v">
      <use href="#pipe-straight-h" transform="rotate(90 9 9)" />
    </g>

    <!-- ❸ Coude 90° (angle externe) -->
    <g id="pipe-elbow">
      <!-- bloc de 60x60 -->
      <path d="M 9 0 H 60
               A 9 9 0 0 1 69 9
               V 60
               A 9 9 0 0 1 60 69
               H 9
               A 9 9 0 0 1 0 60
               V 9
               A 9 9 0 0 1 9 0 Z"
            class="pipe"/>
      <path d="M 9 0 H 60
               A 9 9 0 0 1 69 9
               V 60
               A 9 9 0 0 1 60 69
               H 9
               A 9 9 0 0 1 0 60
               V 9
               A 9 9 0 0 1 9 0 Z"
            class="pipe-border"/>
    </g>

    <!-- ❹ T de dérivation (horizontal + branche verticale) -->
    <g id="pipe-T">
      <!-- barre principale -->
      <use href="#pipe-straight-h" x="0" y="21"/>
      <!-- branche verticale au centre -->
      <rect x="51" y="0" width="18" height="42" rx="8" ry="8" class="pipe"/>
      <rect x="51" y="0" width="18" height="42" rx="8" ry="8" class="pipe-border"/>
    </g>

    <!-- ❺ Croisillon (intersection 4 directions) -->
    <g id="pipe-cross">
      <!-- horizontal -->
      <use href="#pipe-straight-h" x="0" y="21"/>
      <!-- vertical -->
      <rect x="51" y="0" width="18" height="63" rx="8" ry="8" class="pipe"/>
      <rect x="51" y="0" width="18" height="63" rx="8" ry="8" class="pipe-border"/>
    </g>

    <!-- ❻ Valve (roue numérotée) -->
    <g id="valve">
      <circle cx="0" cy="0" r="20" class="valve-wheel"/>
      <circle cx="0" cy="0" r="12" class="valve-inner"/>
      <!-- branches de la roue -->
      <path d="M -12 0 H 12 M 0 -12 V 12" stroke="#f5e4c8" stroke-width="3" />
      <!-- numéro (à changer avec <text>) -->
      <text x="0" y="4" text-anchor="middle" class="label">1</text>
    </g>

    <!-- ❼ Givre à poser sur un segment -->
    <g id="frost-chunk">
      <path d="M0 0 
               C 15 -8, 35 -8, 50 0
               L 48 10
               C 42 5, 38 15, 34 10
               C 30 18, 26 8, 22 11
               C 18 16, 14 6, 10 9
               C 6 12, 4 6, 0 10 Z"
            class="frost"/>
    </g>

    <!-- ❽ Cap de fin (S ou M) -->
    <g id="node-cap">
      <circle cx="0" cy="0" r="20" class="node-cap"/>
      <text x="0" y="4" text-anchor="middle" class="label">S</text>
    </g>

  </defs>

  <!-- Zone de démonstration : tu peux virer tout ça et ne garder que les <defs> -->

  <!-- Exemple : source S -->
  <use href="#node-cap" x="80" y="200" />
  <!-- lettre S est dans le <g>, tu peux la changer dans un éditeur SVG -->

  <!-- Exemple : un segment droit avec givre -->
  <use href="#pipe-straight-h" x="140" y="191" />
  <use href="#frost-chunk" x="165" y="182" />

  <!-- Exemple : une valve sur un tuyau vertical -->
  <use href="#pipe-straight-v" x="260" y="140" />
  <use href="#valve" x="269" y="180" />

</svg>
