<svg width="220" height="160" viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="machineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="50%" style="stop-color:#654321"/>
      <stop offset="100%" style="stop-color:#3e2723"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" style="stop-color:#ffd700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#666"/>
      <stop offset="50%" style="stop-color:#999"/>
      <stop offset="100%" style="stop-color:#666"/>
    </linearGradient>
  </defs>

  <!-- Base de la machine -->
  <rect x="20" y="65" width="180" height="80" fill="url(#machineGrad)" stroke="#2c1810" stroke-width="4" rx="12"/>
  <rect x="25" y="70" width="170" height="70" fill="rgba(0,0,0,0.1)" rx="8"/>

  <!-- Fenêtre transparente montrant les engrenages -->
  <rect x="45" y="80" width="130" height="50" fill="rgba(0,0,0,0.4)" stroke="#1a1a1a" stroke-width="3" rx="6"/>

  <!-- Engrenages visibles à l'intérieur avec animation -->
  <g id="mini-gears">
    <circle cx="80" cy="105" r="15" fill="#cd7f32" stroke="#8b4513" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 80 105;360 80 105" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="110" cy="105" r="12" fill="#708090" stroke="#36454f" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="360 110 105;0 110 105" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="105" r="10" fill="#4682b4" stroke="#2f4f4f" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 140 105;360 140 105" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="90" r="8" fill="#c0c0c0" stroke="#808080" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="360 95 90;0 95 90" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="125" cy="90" r="6" fill="#9370db" stroke="#663399" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 125 90;360 125 90" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Lueur des engrenages -->
  <circle cx="80" cy="105" r="18" fill="url(#glowGrad)" opacity="0.6"/>
  <circle cx="110" cy="105" r="15" fill="url(#glowGrad)" opacity="0.5"/>
  <circle cx="140" cy="105" r="13" fill="url(#glowGrad)" opacity="0.4"/>

  <!-- Tuyau de sortie vapeur complexe -->
  <rect x="200" y="95" width="18" height="10" fill="url(#pipeGrad)" stroke="#333" stroke-width="1" rx="5"/>
  <rect x="218" y="97" width="12" height="6" fill="url(#pipeGrad)" stroke="#333" stroke-width="1" rx="3"/>
  <circle cx="235" cy="100" r="4" fill="#666" stroke="#333" stroke-width="1"/>

  <!-- Particules de vapeur améliorées -->
  <g id="steam-particles">
    <circle cx="240" cy="100" r="2" fill="#ddd" opacity="0.9">
      <animate attributeName="cx" values="240;260;280" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;95;90" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;3;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.5;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="242" cy="98" r="1.5" fill="#ddd" opacity="0.7">
      <animate attributeName="cx" values="242;262;285" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="98;93;88" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;2.5;3.5" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.4;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="238" cy="102" r="1.8" fill="#ddd" opacity="0.8">
      <animate attributeName="cx" values="238;258;278" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="102;97;92" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;2.8;3.8" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Indicateurs de statut améliorés -->
  <circle cx="50" cy="90" r="4" fill="#00ff00" stroke="#008000" stroke-width="1">
    <animate attributeName="fill" values="#00ff00;#90EE90;#00ff00" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="90" r="4" fill="#ffd700" stroke="#b8860b" stroke-width="1">
    <animate attributeName="fill" values="#ffd700;#ffff99;#ffd700" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="120" r="3" fill="#ff4444" stroke="#cc0000" stroke-width="1">
    <animate attributeName="fill" values="#ff4444;#ff8888;#ff4444" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="120" r="3" fill="#4444ff" stroke="#0000cc" stroke-width="1">
    <animate attributeName="fill" values="#4444ff;#8888ff;#4444ff" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Panneau de contrôle central -->
  <rect x="70" y="50" width="80" height="18" fill="#2f2f2f" stroke="#1a1a1a" stroke-width="2" rx="4"/>
  <rect x="78" y="54" width="12" height="4" fill="#00ff00" rx="2">
    <animate attributeName="fill" values="#00ff00;#66ff66;#00ff00" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="94" y="54" width="12" height="4" fill="#ffd700" rx="2">
    <animate attributeName="fill" values="#ffd700;#ffff66;#ffd700" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="110" y="54" width="12" height="4" fill="#ff4444" rx="2">
    <animate attributeName="fill" values="#ff4444;#ff8888;#ff4444" dur="0.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="126" y="54" width="12" height="4" fill="#4444ff" rx="2">
    <animate attributeName="fill" values="#4444ff;#8888ff;#4444ff" dur="2.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Écran de contrôle -->
  <rect x="85" y="58" width="50" height="6" fill="#003300" stroke="#006600" stroke-width="1" rx="1"/>
  <text x="110" y="62.5" text-anchor="middle" font-size="3" fill="#00ff00" font-family="monospace">STATUS: OPTIMAL</text>

  <!-- Titre de la machine -->
  <text x="110" y="40" text-anchor="middle" font-size="8" fill="#654321" font-family="serif">Machine Industrielle MK-II</text>

  <!-- Détails techniques -->
  <rect x="30" y="75" width="8" height="20" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1" rx="2"/>
  <rect x="182" y="75" width="8" height="20" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1" rx="2"/>
  <rect x="30" y="125" width="8" height="15" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1" rx="2"/>
  <rect x="182" y="125" width="8" height="15" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1" rx="2"/>

  <!-- Badges de sécurité -->
  <circle cx="35" cy="140" r="6" fill="#ff6600" stroke="#cc4400" stroke-width="1"/>
  <text x="35" y="143" text-anchor="middle" font-size="4" fill="white" font-weight="bold">⚠</text>

  <circle cx="185" cy="140" r="6" fill="#0066ff" stroke="#0044cc" stroke-width="1"/>
  <text x="185" y="143" text-anchor="middle" font-size="4" fill="white" font-weight="bold">ℹ</text>
</svg>