<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="quantumGrad" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#e0ffff"/>
      <stop offset="100%" style="stop-color:#00ffff"/>
    </radialGradient>
    <filter id="quantum-glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="12" cy="12" r="10" fill="url(#quantumGrad)" stroke="#008b8b" stroke-width="1" filter="url(#quantum-glow)"/>
  <circle cx="12" cy="12" r="3" fill="#2c1810"/>

  <!-- Dents quantiques -->
  <g stroke="#008b8b" stroke-width="1" fill="none">
    <circle cx="12" cy="2" r="1.5"/>
    <circle cx="22" cy="12" r="1.5"/>
    <circle cx="12" cy="22" r="1.5"/>
    <circle cx="2" cy="12" r="1.5"/>
    <circle cx="19" cy="5" r="1"/>
    <circle cx="19" cy="19" r="1"/>
    <circle cx="5" cy="19" r="1"/>
    <circle cx="5" cy="5" r="1"/>
  </g>

  <!-- Ondulations quantiques -->
  <path d="M12,6 Q18,12 12,18 Q6,12 12,6" stroke="#00ffff" stroke-width="0.8" fill="none" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- Particules quantiques -->
  <circle cx="8" cy="8" r="0.8" fill="#00ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="8" r="0.8" fill="#00ffff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="16" r="0.8" fill="#00ffff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="16" r="0.8" fill="#00ffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>