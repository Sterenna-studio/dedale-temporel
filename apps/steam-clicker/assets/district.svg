<svg width="100" height="60" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="districtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#708090"/>
      <stop offset="100%" style="stop-color:#2f4f4f"/>
    </linearGradient>
    <radialGradient id="industrialGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#4682b4" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#4682b4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Quartier industriel - Base -->
  <rect x="5" y="25" width="90" height="30" fill="url(#districtGrad)" stroke="#1c3333" stroke-width="3" rx="6"/>
  <rect x="5" y="25" width="90" height="30" fill="url(#industrialGlow)" rx="6"/>

  <!-- Bâtiments multiples -->
  <rect x="10" y="18" width="18" height="27" fill="#5a5a5a" stroke="#333" stroke-width="1" rx="2"/>
  <rect x="35" y="12" width="18" height="33" fill="#5a5a5a" stroke="#333" stroke-width="1" rx="2"/>
  <rect x="60" y="15" width="18" height="30" fill="#5a5a5a" stroke="#333" stroke-width="1" rx="2"/>
  <rect x="82" y="20" width="14" height="25" fill="#5a5a5a" stroke="#333" stroke-width="1" rx="2"/>

  <!-- Fenêtres éclairées -->
  <rect x="13" y="22" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="18" y="22" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="23" y="28" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>

  <rect x="38" y="16" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="43" y="16" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="48" y="22" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="38" y="28" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>

  <rect x="63" y="19" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="68" y="19" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>
  <rect x="73" y="25" width="3" height="4" fill="#ffff99" stroke="#ffd700" stroke-width="0.5"/>

  <!-- Cheminées multiples -->
  <rect x="16" y="8" width="3" height="10" fill="#333"/>
  <rect x="41" y="3" width="3" height="9" fill="#333"/>
  <rect x="66" y="6" width="3" height="9" fill="#333"/>
  <rect x="86" y="10" width="3" height="10" fill="#333"/>

  <!-- Fumée industrielle -->
  <ellipse cx="17.5" cy="6" rx="4" ry="2" fill="#888" opacity="0.7">
    <animate attributeName="ry" values="2;3;2" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="42.5" cy="1" rx="3.5" ry="1.8" fill="#888" opacity="0.7">
    <animate attributeName="ry" values="1.8;2.5;1.8" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="67.5" cy="4" rx="3.8" ry="2.2" fill="#888" opacity="0.7">
    <animate attributeName="ry" values="2.2;3;2.2" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="87.5" cy="8" rx="3" ry="1.6" fill="#888" opacity="0.7">
    <animate attributeName="ry" values="1.6;2.3;1.6" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Routes connectées -->
  <rect x="0" y="48" width="100" height="4" fill="#4a4a4a" stroke="#333" stroke-width="1"/>
  <rect x="28" y="45" width="4" height="15" fill="#4a4a4a" stroke="#333" stroke-width="1"/>
  <rect x="53" y="45" width="4" height="15" fill="#4a4a4a" stroke="#333" stroke-width="1"/>

  <!-- Panneau de quartier -->
  <rect x="30" y="52" width="40" height="6" fill="rgba(70,130,180,0.9)" stroke="#2f4f4f" stroke-width="1" rx="2"/>
  <text x="50" y="57" text-anchor="middle" font-size="4" fill="#f4e4bc" font-family="serif">QUARTIER INDUSTRIEL</text>
</svg>