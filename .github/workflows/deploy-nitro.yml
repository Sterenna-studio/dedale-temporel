name: Deploy to Nitro

# Assemble le couloir des portes temporelles + le contenu des salles
# dans un seul arbre, puis le déploie sur https://nitro.sterenna.fr/dedale/
# via rsync SSH (convention Nitro apps).
#
# Apps déployées :
#   /dedale/              <- apps/corridor (couloir principal)
#   /dedale/sounds/       <- assets/sfx/sounds
#   /dedale/portemachine/ <- apps/spectrocrypt/public
#   /dedale/reliques/     <- apps/imprimerie  (excl. old.vers/)
#   /dedale/briefing/     <- apps/salles/briefing
#   /dedale/cartographie/ <- apps/salles/cartographie
#   /dedale/observatoire/ <- apps/salles/observatoire
#   /dedale/archive/      <- apps/salles/archive
#   /dedale/condamnee/    <- apps/salles/condamnee
#   /dedale/steam-clicker/<- apps/steam-clicker-wl  (version whitelist)
#   /dedale/workplate/    <- apps/WORKPLATE
#   /dedale/dispersion/   <- apps/dispersion  (version active : index.html uniquement)

on:
  push:
    branches: [main]
    paths:
      - "apps/corridor/**"
      - "apps/spectrocrypt/public/**"
      - "apps/imprimerie/**"
      - "apps/salles/**"
      - "apps/steam-clicker-wl/**"
      - "apps/WORKPLATE/**"
      - "apps/dispersion/**"
      - "assets/sfx/sounds/**"
      - "deploy/**"
      - ".github/workflows/deploy-nitro.yml"
  workflow_dispatch:

concurrency:
  group: deploy-nitro
  cancel-in-progress: true

env:
  CORRIDOR_SRC:     apps/corridor
  PORTEMACHINE_SRC: apps/spectrocrypt/public
  RELIQUES_SRC:     apps/imprimerie
  SOUNDS_SRC:       assets/sfx/sounds
  SALLES_SRC:       apps/salles
  STEAMCLICKER_SRC: apps/steam-clicker-wl
  WORKPLATE_SRC:    apps/WORKPLATE
  DISPERSION_SRC:   apps/dispersion

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site tree
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Couloir des portes (racine de /dedale/)
          cp -r "$CORRIDOR_SRC/." _site/

          # Sons du couloir
          mkdir -p _site/sounds
          cp -r "$SOUNDS_SRC/." _site/sounds/

          # Porte-Machine -> SpectroCrypt
          mkdir -p _site/portemachine
          cp -r "$PORTEMACHINE_SRC/." _site/portemachine/

          # Atelier des Reliques -> Imprimerie Médicale (sans old.vers/)
          mkdir -p _site/reliques
          rsync -a --exclude='old.vers/' "$RELIQUES_SRC/" _site/reliques/

          # Salles-énigmes du scénario
          for salle in briefing cartographie observatoire archive condamnee; do
            mkdir -p "_site/$salle"
            cp -r "$SALLES_SRC/$salle/." "_site/$salle/"
          done

          # Salle des Engrenages -> Steam Clicker (version whitelist)
          mkdir -p _site/steam-clicker
          rsync -a \
            --exclude='.gitignore' \
            --exclude='README*' \
            --exclude='old.vers/' \
            "$STEAMCLICKER_SRC/" _site/steam-clicker/

          # Atelier de Calibration -> Workplate
          mkdir -p _site/workplate
          cp -r "$WORKPLATE_SRC/." _site/workplate/

          # Chambre de Dispersion -> version active uniquement (index.html)
          mkdir -p _site/dispersion
          rsync -a \
            --exclude='indexv2*.html' \
            --exclude='editeur_tuyaux.html' \
            "$DISPERSION_SRC/" _site/dispersion/

          echo "----- arbre assemblé -----"
          find _site -maxdepth 2 -type d | sort

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            _site/ \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/dedale/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
