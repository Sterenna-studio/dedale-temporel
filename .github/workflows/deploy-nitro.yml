name: Deploy to Nitro

# Assemble le couloir des portes temporelles + le contenu des salles
# dans un seul arbre, puis le déploie sur https://nitro.sterenna.fr/dedale/
# via rsync SSH (convention Nitro apps).

on:
  push:
    branches: [main]
    paths:
      - "dedale_dossier_complet_v6/**"
      - "spectrocrypt_v1_vanilla/public/**"
      - "impirmerie_medical/med_imprimerie_puzzle_v7_8_1/**"
      - "deploy/**"
      - ".github/workflows/deploy-nitro.yml"
  workflow_dispatch:

concurrency:
  group: deploy-nitro
  cancel-in-progress: true

env:
  # Sources -> sous-chemins servis sous /dedale/
  CORRIDOR_SRC: dedale_dossier_complet_v6
  PORTEMACHINE_SRC: spectrocrypt_v1_vanilla/public
  RELIQUES_SRC: impirmerie_medical/med_imprimerie_puzzle_v7_8_1/med_imprimerie_puzzle_v7_6_2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site tree
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site

          # Couloir des portes (racine de /dedale/)
          cp -r "$CORRIDOR_SRC/." _site/

          # Porte-Machine -> SpectroCrypt
          mkdir -p _site/portemachine
          cp -r "$PORTEMACHINE_SRC/." _site/portemachine/

          # Atelier des Reliques -> Imprimerie Médicale
          mkdir -p _site/reliques
          cp -r "$RELIQUES_SRC/." _site/reliques/

          # Portes sans contenu -> page d'attente « salle en calibrage »
          for salle in briefing cartographie archive observatoire; do
            mkdir -p "_site/$salle"
            cp deploy/salle-attente.html "_site/$salle/index.html"
          done

          echo "----- arbre assemblé -----"
          find _site -maxdepth 2 -type d | sort

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.OVH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            _site/ \
            "${{ secrets.OVH_USER }}@${{ secrets.OVH_HOST }}:~/nitro/dedale/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
