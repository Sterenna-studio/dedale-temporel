<svg width="120" height="70" viewBox="0 0 120 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="conglomerateGrad" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#4682b4"/>
      <stop offset="30%" style="stop-color:#36648b"/>
      <stop offset="100%" style="stop-color:#191970"/>
    </radialGradient>
    <linearGradient id="megaStructure" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a7fa5"/>
      <stop offset="100%" style="stop-color:#2c4a6b"/>
    </linearGradient>
    <filter id="conglomerate-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Conglomérat - Base complexe -->
  <rect x="5" y="30" width="110" height="35" fill="url(#conglomerateGrad)" stroke="#0f0f47" stroke-width="4" rx="8" filter="url(#conglomerate-glow)"/>

  <!-- Tours principales avec hauteurs variées -->
  <rect x="10" y="18" width="15" height="42" fill="url(#megaStructure)" stroke="#1e3a5f" stroke-width="2" rx="3"/>
  <rect x="30" y="12" width="18" height="48" fill="url(#megaStructure)" stroke="#1e3a5f" stroke-width="2" rx="3"/>
  <rect x="55" y="8" width="20" height="52" fill="url(#megaStructure)" stroke="#1e3a5f" stroke-width="2" rx="3"/>
  <rect x="80" y="15" width="18" height="45" fill="url(#megaStructure)" stroke="#1e3a5f" stroke-width="2" rx="3"/>
  <rect x="100" y="20" width="15" height="40" fill="url(#megaStructure)" stroke="#1e3a5f" stroke-width="2" rx="3"/>

  <!-- Structures de liaison -->
  <rect x="25" y="25" width="8" height="3" fill="#36648b" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="48" y="22" width="10" height="3" fill="#36648b" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="75" y="28" width="8" height="3" fill="#36648b" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="95" y="32" width="8" height="3" fill="#36648b" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Détails industriels complexes -->
  <rect x="12" y="22" width="11" height="5" fill="#1c3333" stroke="#0f1f1f" stroke-width="1" rx="1"/>
  <rect x="32" y="16" width="14" height="6" fill="#1c3333" stroke="#0f1f1f" stroke-width="1" rx="1"/>
  <rect x="57" y="12" width="16" height="7" fill="#1c3333" stroke="#0f1f1f" stroke-width="1" rx="1"/>
  <rect x="82" y="19" width="14" height="5" fill="#1c3333" stroke="#0f1f1f" stroke-width="1" rx="1"/>
  <rect x="102" y="24" width="11" height="4" fill="#1c3333" stroke="#0f1f1f" stroke-width="1" rx="1"/>

  <!-- Éclairage de nuit -->
  <rect x="14" y="25" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="18" y="30" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="1;0.7;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <rect x="35" y="19" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="42" y="24" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="60" y="15" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="1;0.8;1" dur="1.9s" repeatCount="indefinite"/>
  </rect>
  <rect x="67" y="20" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.8;0.9;0.8" dur="2.1s" repeatCount="indefinite"/>
  </rect>

  <rect x="85" y="22" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="92" y="27" width="2" height="3" fill="#00ffff" stroke="#0088cc" stroke-width="0.5">
    <animate attributeName="opacity" values="1;0.7;1" dur="1.7s" repeatCount="indefinite"/>
  </rect>

  <!-- Cheminées industrielles multiples -->
  <rect x="16" y="2" width="4" height="16" fill="#2f2f2f" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="38" y="1" width="4" height="11" fill="#2f2f2f" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="63" y="0" width="5" height="8" fill="#2f2f2f" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="86" y="3" width="4" height="12" fill="#2f2f2f" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="105" y="6" width="3" height="14" fill="#2f2f2f" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Fumée industrielle massive -->
  <ellipse cx="18" cy="0" rx="5" ry="3" fill="#666" opacity="0.9">
    <animate attributeName="ry" values="3;4;3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.6;0.9" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="40" cy="-1" rx="4" ry="2.5" fill="#666" opacity="0.8">
    <animate attributeName="ry" values="2.5;3.5;2.5" dur="3.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="65.5" cy="-2" rx="4.5" ry="3" fill="#666" opacity="0.85">
    <animate attributeName="ry" values="3;4;3" dur="3.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="88" cy="1" rx="3.8" ry="2.8" fill="#666" opacity="0.8">
    <animate attributeName="ry" values="2.8;3.8;2.8" dur="4.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="106.5" cy="4" rx="3" ry="2" fill="#666" opacity="0.75">
    <animate attributeName="ry" values="2;3;2" dur="3.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Infrastructure routière complexe -->
  <rect x="0" y="60" width="120" height="6" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="25" y="60" width="6" height="10" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="50" y="60" width="8" height="10" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="78" y="60" width="6" height="10" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Logo corporatif -->
  <circle cx="60" cy="50" r="12" fill="rgba(70,130,180,0.9)" stroke="#0f0f47" stroke-width="2"/>
  <text x="60" y="47" text-anchor="middle" font-size="6" fill="#f4e4bc" font-family="serif" font-weight="bold">MEGA</text>
  <text x="60" y="54" text-anchor="middle" font-size="4" fill="#f4e4bc" font-family="serif">CORP</text>
</svg>