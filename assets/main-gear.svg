<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mainGearGrad" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="30%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="url(#mainGearGrad)" filter="url(#glow)">
    <circle cx="90" cy="20" r="8"/>
    <circle cx="135" cy="35" r="8"/>
    <circle cx="160" cy="90" r="8"/>
    <circle cx="135" cy="145" r="8"/>
    <circle cx="90" cy="160" r="8"/>
    <circle cx="45" cy="145" r="8"/>
    <circle cx="20" cy="90" r="8"/>
    <circle cx="45" cy="35" r="8"/>
  </g>

  <circle cx="90" cy="90" r="60" fill="url(#mainGearGrad)" stroke="#8b6914" stroke-width="3" filter="url(#glow)"/>

  <circle cx="90" cy="90" r="15" fill="#2c1810" stroke="#8b6914" stroke-width="2"/>

  <g stroke="#8b6914" stroke-width="3" opacity="0.8">
    <line x1="90" y1="45" x2="90" y2="75"/>
    <line x1="90" y1="105" x2="90" y2="135"/>
    <line x1="45" y1="90" x2="75" y2="90"/>
    <line x1="105" y1="90" x2="135" y2="90"/>
  </g>
</svg>